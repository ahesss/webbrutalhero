<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBrutalHero — HERO-SMS MEXICO ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060608;
            --panel: #0e0e12;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --gold: #ffcc00;
            --text: #f0f0f0;
            --text-dim: #888888;
            --success: #00ffaa;
            --danger: #ff4d4d;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, #001a1a 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, #1a001a 0%, transparent 40%);
            min-height: 100vh;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 30px;
            box-shadow: 0 10px 20px -10px var(--accent-glow);
        }

        .logo { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: #fff; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .balance-card {
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: inset 0 0 10px var(--accent-glow);
        }
        .balance-card span { color: var(--success); font-weight: 800; font-family: 'JetBrains Mono', monospace; font-size: 18px; }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
        }

        .card {
            background: var(--panel);
            padding: 20px;
            border-radius: 22px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            transition: 0.3s;
            font-size: 14px;
            margin-bottom: 15px;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .btn {
            padding: 14px 30px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 25px var(--accent-glow); }
        .btn-stop { background: var(--danger); color: #fff; }

        .target-info {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--accent);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .target-info h2 { font-size: 32px; margin-bottom: 5px; }
        
        .stats-box {
            padding: 15px;
            background: #000;
            border-radius: 16px;
            border: 1px solid var(--border);
            font-size: 14px;
        }
        .stats-box p { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .stats-box span { color: var(--accent); font-weight: 800; font-family: 'JetBrains Mono', monospace; }

        .log-box {
            margin-top: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            height: 80px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .log-line { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 2px 0; }
        .log-err { color: var(--danger); }
        .log-ok { color: var(--success); }

        .orders-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 80vh;
            overflow-y: auto;
            padding-right: 5px;
        }
        .orders-container::-webkit-scrollbar { width: 4px; }
        .orders-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .order-item {
            background: var(--panel);
            padding: 15px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--accent);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .order-num { font-size: 20px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #fff; cursor: pointer; }
        .otp-badge {
            background: var(--success);
            color: #000;
            padding: 6px 18px;
            border-radius: 8px;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            box-shadow: 0 0 15px var(--success);
            cursor: pointer;
        }

        .notif {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 12px;
            background: var(--accent);
            color: #000;
            font-weight: 800;
            transform: translateY(150px);
            transition: 0.4s;
            z-index: 1000;
        }
        .notif.show { transform: translateY(0); }

        .loading-ring {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 242, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">WEBBRUTAL <span>HERO</span></div>
        <div class="balance-card" onclick="updateBalance()">
            💰 <span id="balance-val">0.00</span> USD
        </div>
    </header>

    <div class="main-grid">
        <div class="sidebar">
            <div class="card">
                <p style="font-size: 12px; color: var(--text-dim); margin-bottom: 5px;">HERO-SMS API KEY</p>
                <input type="password" id="api-key" placeholder="Masukkan Key..." onchange="saveKey()">
                <button class="btn btn-primary" onclick="updateBalance()" style="margin-bottom: 10px; font-size: 12px; padding: 10px;">SYNC BALANCE</button>
            </div>

            <div class="card">
                <div class="target-info">
                    <p>TARGET</p>
                    <h2>MEXICO 🇲🇽</h2>
                    <p style="color: var(--gold); margin-top: 5px;">LIMIT: $1.60</p>
                </div>
                <button id="start-btn" class="btn btn-primary" style="height: 55px;" onclick="toggleAutoBuy()">🚀 START MEXICO WAR</button>
            </div>

            <div class="card">
                <div class="stats-box">
                    <p>STATUS: <span id="status-text">OFFLINE</span></p>
                    <p>ATTEMPTS: <span id="stat-att">0</span></p>
                    <p>FOUND: <span id="stat-found">0</span></p>
                    <p>SPEED: <span id="stat-speed">0.0</span>/s</p>
                </div>
                <div class="log-box" id="log-monitor">
                    <div class="log-line">Waiting for action...</div>
                </div>
            </div>
            
            <button class="btn" style="background: rgba(255,255,255,0.05); color: #fff; margin-top: 10px;" onclick="copyAll()">📋 COPY ALL NUMBERS</button>
        </div>

        <div class="content">
            <div class="orders-container" id="orders-list">
                <div style="text-align: center; color: var(--text-dim); margin-top: 100px;">
                    <p style="font-size: 40px;">🇲🇽</p>
                    <p>BELUM ADA NOMOR</p>
                    <p style="font-size: 11px;">Keep this tab open for best performance</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="notif" id="notif">Copied!</div>

<script>
    let isRunning = false;
    let apiKey = localStorage.getItem('webbrutalhero_key') || '';
    let orders = [];
    let stats = { att: 0, found: 0, startTime: 0 };

    if (apiKey) document.getElementById('api-key').value = apiKey;

    function saveKey() {
        apiKey = document.getElementById('api-key').value.trim();
        localStorage.setItem('webbrutalhero_key', apiKey);
    }

    function addLog(msg, type='') {
        const log = document.getElementById('log-monitor');
        const d = new Date().toLocaleTimeString();
        const line = document.createElement('div');
        line.className = 'log-line ' + (type === 'err' ? 'log-err' : type === 'ok' ? 'log-ok' : '');
        line.innerText = `[${d}] ${msg}`;
        log.prepend(line);
        if (log.children.length > 50) log.lastChild.remove();
    }

    async function reqApi(action, extra = {}) {
        if (!apiKey) return;
        const params = new URLSearchParams({ action, api_key: apiKey, ...extra });
        try {
            const r = await fetch(`/api/proxy?${params.toString()}`);
            const txt = await r.text();
            // Cek jika API merespon eror
            if (txt.includes('BAD_KEY') || txt.includes('ERROR_KEY')) {
                addLog('WARNING: API Key Invalid/Banned!', 'err');
            }
            return txt.trim();
        } catch (e) { 
            addLog('ERR: Network Error', 'err');
            return 'ERR_HTTP'; 
        }
    }

    async function updateBalance() {
        saveKey();
        const res = await reqApi('getBalance');
        if (res && res.includes('ACCESS_BALANCE')) {
            const b = res.split(':')[1];
            document.getElementById('balance-val').innerText = parseFloat(b).toFixed(2);
            showNotif('BALANCE UPDATED: $' + b);
            addLog('Balance synced: $' + b, 'ok');
        } else {
            addLog('Failed to sync balance', 'err');
        }
    }

    function showNotif(txt) {
        const n = document.getElementById('notif');
        n.innerText = txt;
        n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 2000);
    }

    function toggleAutoBuy() {
        if (!apiKey) { alert('Masukkan API Key!'); return; }
        isRunning = !isRunning;
        const btn = document.getElementById('start-btn');
        const stText = document.getElementById('status-text');

        if (isRunning) {
            btn.innerText = '🛑 STOP MEXICO WAR';
            btn.className = 'btn btn-stop';
            stText.innerText = 'BRUTAL MODE';
            stText.style.color = '#00ffaa';
            resetStats();
            brutalLoop();
            addLog('ULTRA BRUTAL STARTED', 'ok');
        } else {
            btn.innerText = '🚀 START MEXICO WAR';
            btn.className = 'btn btn-primary';
            stText.innerText = 'OFFLINE';
            stText.style.color = '#ff4d4d';
            addLog('WAR STOPPED');
        }
    }

    function resetStats() {
        stats = { att: 0, found: 0, startTime: Date.now() };
        updateStatsUi();
    }

    function updateStatsUi() {
        const el = (Date.now() - stats.startTime) / 1000;
        document.getElementById('stat-att').innerText = stats.att;
        document.getElementById('stat-found').innerText = stats.found;
        document.getElementById('stat-speed').innerText = (stats.att / Math.max(el, 1)).toFixed(1);
    }

    // NEW STABLE ASYNC LOOP (Tidak menumpuk dan tahan banting)
    async function brutalLoop() {
        while (isRunning) {
            stats.att++;
            if (stats.att % 10 === 0) updateStatsUi();

            // Fire request
            const res = await reqApi('getNumber', { service: 'wa', country: '54', maxPrice: '1.6' });
            
            if (res && res.includes('ACCESS_NUMBER')) {
                const [_, id, num] = res.split(':');
                stats.found++;
                addOrder(id, num);
                updateStatsUi();
                playAlert();
                addLog('GOT NUMBER: ' + num, 'ok');
            } else if (res && res.includes('NO_BALANCE')) {
                alert('SALDO HABIS!');
                isRunning = false;
                toggleAutoBuy();
                break;
            } else if (res && (res.includes('BAD_KEY') || res.includes('ERROR_KEY'))) {
                // Jangan langsung mati, cooling down
                addLog('Rate Limit / Key Error. Sleeping 2s...', 'err');
                await new Promise(r => setTimeout(r, 2000));
            } else if (res && res.includes('NO_NUMBERS')) {
                // Normal case, just continue kencang
            }

            // Jeda milidetik (tetap kencang tapi stabil)
            await new Promise(r => setTimeout(r, 5));
        }
    }

    function addOrder(id, num) {
        const order = { id, number: num, status: 'waiting', otp: '', time: Date.now() };
        orders.unshift(order);
        renderOrders();
    }

    function renderOrders() {
        const list = document.getElementById('orders-list');
        if (orders.length === 0) return;

        list.innerHTML = orders.map(o => `
            <div class="order-item">
                <div class="order-info">
                    <div class="order-num" onclick="copyText('${o.number}')">+${o.number}</div>
                    <div class="order-meta">ID: ${o.id} | $1.60</div>
                </div>
                <div class="order-status">
                    ${o.otp ? `<div class="otp-badge" onclick="copyText('${o.otp}')">${o.otp}</div>` : 
                      o.status === 'waiting' ? `<div class="loading-ring"></div>` : 
                      `<span>${o.status.toUpperCase()}</span>`}
                    
                    ${o.status === 'waiting' ? `<button class="btn-cancel" onclick="cancelOrder('${o.id}')">CANCEL</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    // OTP MONITORING (Setiap 4 detik)
    setInterval(async () => {
        const waiting = orders.filter(o => o.status === 'waiting');
        for (const o of waiting) {
            const res = await reqApi('getStatus', { id: o.id });
            if (res && res.includes('STATUS_OK')) {
                o.status = 'done';
                o.otp = res.split(':')[1];
                reqApi('setStatus', { id: o.id, status: 6 }); // Set ke Finish
                renderOrders();
                playBeep();
                showNotif('🎉 OTP: ' + o.otp);
                addLog('OTP Received for ' + o.number, 'ok');
            }
            if ((Date.now() - o.time) > 1200000) {
                o.status = 'expired';
                renderOrders();
            }
        }
    }, 4000);

    async function cancelOrder(id) {
        const res = await reqApi('setStatus', { id, status: 8 });
        if (res && res.includes('ACCESS_CANCEL')) {
            const o = orders.find(x => x.id === id);
            if (o) o.status = 'cancelled';
            renderOrders();
            showNotif('CANCELLED');
        } else {
            showNotif('WAIT 2 MIN');
        }
    }

    function copyText(txt) {
        navigator.clipboard.writeText(txt);
        showNotif('COPIED!');
    }

    function copyAll() {
        const nums = orders.filter(o => o.status === 'waiting').map(o => o.number).join('\n');
        if (!nums) return;
        navigator.clipboard.writeText(nums);
        showNotif('COPIED ALL!');
    }

    function playAlert() { new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{}); }
    function playBeep() { new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3').play().catch(()=>{}); }

    // Keep session alive periodically
    setInterval(updateBalance, 60000);

</script>
</body>
</html>
