<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBrutalHero — HERO-SMS MEXICO SPECIALIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060608;
            --panel: #0e0e12;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --gold: #ffcc00;
            --text: #f0f0f0;
            --text-dim: #888888;
            --success: #00ffaa;
            --danger: #ff4d4d;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, #001a1a 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, #1a001a 0%, transparent 40%);
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 30px;
            box-shadow: 0 10px 20px -10px var(--accent-glow);
        }

        .logo { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: #fff; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .balance-card {
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: inset 0 0 10px var(--accent-glow);
        }
        .balance-card span { color: var(--success); font-weight: 800; font-family: 'JetBrains Mono', monospace; font-size: 18px; }

        .api-section {
            background: var(--panel);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            display: flex;
            gap: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        input {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            transition: 0.3s;
            font-size: 15px;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        
        .btn {
            padding: 14px 30px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 25px var(--accent-glow); }
        .btn-stop { background: var(--danger); color: #fff; }

        .main-grid {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 25px;
        }

        .card {
            background: var(--panel);
            padding: 25px;
            border-radius: 22px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .target-info {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--accent);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .target-info h2 { font-size: 32px; margin-bottom: 5px; }

        .stats-box {
            margin-top: 20px;
            padding: 20px;
            background: #000;
            border-radius: 16px;
            border: 1px solid var(--border);
            font-size: 15px;
        }
        .stats-box p { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .stats-box span { color: var(--accent); font-weight: 800; font-family: 'JetBrains Mono', monospace; }

        .orders-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 75vh;
            overflow-y: auto;
            padding-right: 8px;
        }
        .order-item {
            background: var(--panel);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
            border-left: 5px solid var(--accent);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .order-num { font-size: 22px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #fff; cursor: pointer; }
        .otp-badge {
            background: var(--success);
            color: #000;
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            cursor: pointer;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 170, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 255, 170, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 170, 0); } }

        .btn-cancel {
            background: rgba(255, 77, 77, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 6px 12px;
            font-size: 11px;
            border-radius: 8px;
        }

        .notif {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 30px;
            border-radius: 12px;
            background: var(--accent);
            color: #000;
            font-weight: 800;
            transform: translateY(150px);
            transition: 0.3s;
            z-index: 1000;
        }
        .notif.show { transform: translateY(0); }

        .loading-ring { width: 24px; height: 24px; border: 3px solid rgba(0, 242, 255, 0.1); border-radius: 50%; border-top-color: var(--accent); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">WEBBRUTAL <span>HERO</span></div>
        <div class="balance-card" onclick="updateBalance()">
            💰 <span id="balance-val">0.00</span> USD
        </div>
    </header>

    <div class="api-section">
        <input type="password" id="api-key" placeholder="Masukkan API Key Hero-SMS..." onchange="saveKey()">
        <button class="btn btn-primary" onclick="updateBalance()">ACTIVATE</button>
    </div>

    <div class="main-grid">
        <div class="controls">
            <div class="card">
                <div class="target-info">
                    <p>TARGET COUNTRY</p>
                    <h2>MEXICO 🇲🇽</h2>
                    <p style="color: var(--gold); margin-top: 5px;">MAX PRICE: $1.60</p>
                </div>
                <button id="start-btn" class="btn btn-primary" style="width: 100%; height: 60px;" onclick="toggleAutoBuy()">🚀 START BRUTAL WAR</button>
                <div class="stats-box" id="stats-ui" style="display: none;">
                    <p>STATUS: <span id="status-text" style="color: var(--success);">ULTRA BRUTAL</span></p>
                    <p>ATTEMPTS: <span id="stat-att">0</span></p>
                    <p>FOUND: <span id="stat-found">0</span></p>
                    <p>SPEED: <span id="stat-speed">0.0</span>/s</p>
                </div>
            </div>
            <button class="btn" style="background: var(--glass); margin-top: 20px; width: 100%; color: #fff;" onclick="copyAll()">📋 COPY ALL</button>
        </div>

        <div class="orders-section">
            <div class="orders-container" id="orders-list">
                <div style="text-align: center; color: var(--text-dim); margin-top: 80px;">READY FOR WAR 🇲🇽</div>
            </div>
        </div>
    </div>
</div>

<div class="notif" id="notif">Copied!</div>

<script>
    let isRunning = false;
    let apiKey = localStorage.getItem('webbrutalhero_key') || '';
    let orders = [];
    let stats = { att: 0, found: 0, startTime: 0 };

    if (apiKey) document.getElementById('api-key').value = apiKey;

    function saveKey() {
        apiKey = document.getElementById('api-key').value.trim();
        localStorage.setItem('webbrutalhero_key', apiKey);
    }

    async function reqApi(action, extra = {}) {
        if (!apiKey) return;
        const params = new URLSearchParams({ action, api_key: apiKey, ...extra });
        try {
            const r = await fetch(`/api/proxy?${params.toString()}`);
            return await r.text();
        } catch (e) { return 'ERR_HTTP'; }
    }

    async function updateBalance() {
        saveKey();
        const res = await reqApi('getBalance');
        if (res && res.includes('ACCESS_BALANCE')) {
            const b = res.split(':')[1];
            document.getElementById('balance-val').innerText = b;
            showNotif('BALANCE UPDATED: $' + b);
        }
    }

    function showNotif(txt) {
        const n = document.getElementById('notif');
        n.innerText = txt;
        n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 2000);
    }

    function toggleAutoBuy() {
        if (!apiKey) { alert('Masukkan API Key!'); return; }
        isRunning = !isRunning;
        const btn = document.getElementById('start-btn');
        const statsUi = document.getElementById('stats-ui');

        if (isRunning) {
            btn.innerText = '🛑 STOP ACTION';
            btn.className = 'btn btn-stop';
            statsUi.style.display = 'block';
            resetStats();
            startBrutalLoop();
        } else {
            btn.innerText = '🚀 START BRUTAL WAR';
            btn.className = 'btn btn-primary';
        }
    }

    function resetStats() {
        stats = { att: 0, found: 0, startTime: Date.now() };
        updateStatsUi();
    }

    function updateStatsUi() {
        const el = (Date.now() - stats.startTime) / 1000;
        document.getElementById('stat-att').innerText = stats.att;
        document.getElementById('stat-found').innerText = stats.found;
        document.getElementById('stat-speed').innerText = (stats.att / Math.max(el, 1)).toFixed(1);
    }

    function startBrutalLoop() {
        // REVERT KE SETINTERVAL (ULTRA FAST FIRE & FORGET)
        const loop = setInterval(async () => {
            if (!isRunning) { clearInterval(loop); return; }
            stats.att++;
            if (stats.att % 20 === 0) updateStatsUi();

            doBuy();
        }, 5); 
    }

    async function doBuy() {
        const res = await reqApi('getNumber', { service: 'wa', country: '54', maxPrice: '1.6' });
        if (res && res.includes('ACCESS_NUMBER')) {
            const [_, id, num] = res.split(':');
            stats.found++;
            addOrder(id, num);
            updateStatsUi();
            playAlert();
        } else if (res && res.includes('NO_BALANCE')) {
            isRunning = false;
            toggleAutoBuy();
            alert('SALDO HABIS!');
        }
    }

    function addOrder(id, num) {
        const order = { id, number: num, status: 'waiting', otp: '', time: Date.now() };
        orders.unshift(order);
        renderOrders();
    }

    function renderOrders() {
        const list = document.getElementById('orders-list');
        if (orders.length === 0) return;
        list.innerHTML = orders.map(o => `
            <div class="order-item">
                <div class="order-info">
                    <div class="order-num" onclick="copyText('${o.number}')">+${o.number}</div>
                    <div class="order-meta">MEXICO | $1.60 | ID: ${o.id}</div>
                </div>
                <div class="order-status">
                    ${o.otp ? `<div class="otp-badge" onclick="copyText('${o.otp}')">${o.otp}</div>` : 
                      o.status === 'waiting' ? `<div class="loading-ring"></div>` : 
                      `<span>${o.status.toUpperCase()}</span>`}
                    ${o.status === 'waiting' ? `<button class="btn-cancel" onclick="cancelOrder('${o.id}')">CANCEL</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    setInterval(async () => {
        const waiting = orders.filter(o => o.status === 'waiting');
        for (const o of waiting) {
            const res = await reqApi('getStatus', { id: o.id });
            if (res && res.includes('STATUS_OK')) {
                const otp = res.split(':')[1];
                o.status = 'done';
                o.otp = otp;
                renderOrders();
                playAlert();
                reqApi('setStatus', { id: o.id, status: 6 });
            }
            if ((Date.now() - o.time) > 1200000) { o.status = 'expired'; renderOrders(); }
        }
    }, 4000);

    async function cancelOrder(id) {
        const res = await reqApi('setStatus', { id, status: 8 });
        if (res && res.includes('ACCESS_CANCEL')) {
            const o = orders.find(x => x.id === id);
            if (o) o.status = 'cancelled';
            renderOrders();
        }
    }

    function copyText(txt) { navigator.clipboard.writeText(txt); showNotif('COPIED!'); }
    function copyAll() {
        const t = orders.filter(o => o.status === 'waiting').map(o => o.number).join('\n');
        if (t) { navigator.clipboard.writeText(t); showNotif('ALL COPIED!'); }
    }

    function playAlert() { new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{}); }
</script>
</body>
</html>
