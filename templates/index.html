<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBrutalHero — HERO-SMS ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060608;
            --panel: #0e0e12;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --gold: #ffcc00;
            --text: #f0f0f0;
            --text-dim: #888888;
            --success: #00ffaa;
            --danger: #ff4d4d;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            background-image: radial-gradient(circle at 0% 0%, #001a1a 0%, transparent 40%);
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 30px;
        }

        .logo { font-size: 26px; font-weight: 800; text-transform: uppercase; color: #fff; }
        .logo span { color: var(--accent); }

        .balance-card {
            background: rgba(0, 242, 255, 0.05);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        .balance-card span { color: var(--success); font-weight: 800; font-family: 'JetBrains Mono', monospace; font-size: 18px; }
        .refresh-btn { font-size: 20px; transition: 0.3s; color: var(--accent); }
        .refresh-btn:hover { transform: rotate(180deg); }

        .api-section {
            background: var(--panel);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            display: flex;
            gap: 12px;
        }
        input, select {
            background: #000;
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            width: 100%;
        }
        
        .btn {
            padding: 14px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-stop { background: var(--danger); color: #fff; }

        .main-grid { display: grid; grid-template-columns: 320px 1fr; gap: 25px; }

        .card { background: var(--panel); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }

        .stats-box { padding: 15px; background: #000; border-radius: 12px; font-size: 14px; margin-top: 15px; }
        .stats-box p { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .stats-box span { color: var(--accent); font-weight: 800; }

        /* VERTICAL LIST - ANTI MENYAMPING */
        .orders-container { display: flex; flex-direction: column; gap: 15px; max-height: 80vh; overflow-y: auto; width: 100%; }
        .order-item {
            background: var(--panel);
            width: 100%; 
            padding: 20px 25px;
            border-radius: 18px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid var(--accent);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .order-info { display: flex; flex-direction: column; gap: 5px; }
        .order-num { font-size: 24px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #fff; cursor: pointer; letter-spacing: 1px; }
        .order-meta { font-size: 13px; color: var(--text-dim); display: flex; align-items: center; gap: 10px; }
        .timer-val { color: var(--gold); font-weight: 800; }

        .order-status { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }

        .otp-badge {
            background: var(--success); color: #000; padding: 10px 25px; border-radius: 12px;
            font-weight: 950; font-family: 'JetBrains Mono', monospace; font-size: 26px;
            box-shadow: 0 0 20px var(--success); cursor: pointer;
        }

        .btn-cancel {
            background: rgba(255, 77, 77, 0.1); color: var(--danger); border: 1px solid var(--danger);
            padding: 8px 16px; font-size: 12px; border-radius: 10px; font-weight: 800; cursor: pointer;
        }
        .btn-cancel:disabled { opacity: 0.2; cursor: not-allowed; }

        .debug-console {
            margin-top: 15px; background: rgba(0,0,0,0.5); border-radius: 12px; padding: 10px; 
            font-family: 'JetBrains Mono', monospace; font-size: 10px; height: 100px;
            overflow-y: auto; color: #666;
        }
        .debug-line { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 2px 0; }
        .debug-err { color: var(--danger); }
        .debug-ok { color: var(--success); }

        .notif {
            position: fixed; bottom: 30px; right: 30px; padding: 15px 30px; border-radius: 12px;
            background: var(--accent); color: #000; font-weight: 800; transform: translateY(150px);
            transition: 0.5s; z-index: 1000;
        }
        .notif.show { transform: translateY(0); }

        .loading-ring { width: 28px; height: 28px; border: 3px solid rgba(0, 242, 255, 0.1); border-radius: 50%; border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">WEBBRUTAL <span>HERO</span></div>
        <div class="balance-card" onclick="updateBalance()">
            💰 <span id="balance-val">0.00</span> <small style="color:var(--text-dim)">USD</small>
            <div class="refresh-btn">🔄</div>
        </div>
    </header>

    <div class="api-section">
        <input type="password" id="api-key" placeholder="Enter Hero-SMS API Key..." onchange="saveKey()">
        <button class="btn btn-primary" onclick="updateBalance()" style="width: auto;">SYNC</button>
    </div>

    <div class="main-grid">
        <div class="sidebar">
            <div class="card">
                <h3 style="margin-bottom: 12px; font-size: 14px; color: var(--accent);">SNIPER CONFIG</h3>
                <label style="font-size: 11px; color: var(--text-dim); margin-bottom: 5px; display: block;">TARGET COUNTRY:</label>
                <select id="country-select">
                    <option value="vietnam" data-id="10" data-code="84">Vietnam 🇻🇳</option>
                    <option value="colombia" data-id="33" data-code="57">Colombia 🇨🇴</option>
                    <option value="philipina" data-id="3" data-code="63">Philipina 🇵🇭</option>
                    <option value="mexico" data-id="54" data-code="52" selected>Mexico 🇲🇽 (HOT)</option>
                    <option value="brazil" data-id="73" data-code="55">Brazil 🇧🇷</option>
                </select>

                <label style="font-size: 11px; color: var(--text-dim); margin-top: 10px; margin-bottom: 5px; display: block;">SERVICE CODE (wa):</label>
                <input type="text" id="service-code" value="wa" style="font-size: 12px; padding: 10px; margin-bottom: 10px;">

                <label style="font-size: 11px; color: var(--text-dim); margin-bottom: 5px; display: block;">MAX PRICE ($): <span style="color:var(--danger)">(Kosongkan jika BAD_SERVICE)</span></label>
                <input type="number" id="max-price" value="1.6" step="0.01" style="font-size: 12px; padding: 10px; margin-bottom: 15px;">
                
                <button id="start-btn" class="btn btn-primary" style="height: 60px; font-size: 18px;" onclick="toggleAutoBuy()">🚀 START WAR</button>
                
                <div class="stats-box" id="stats-ui" style="display: none;">
                    <p>ATTEMPTS: <span id="stat-att">0</span></p>
                    <p>FOUND: <span id="stat-found">0</span></p>
                    <p>SPEED: <span id="stat-speed">0.0</span>/s</p>
                </div>

                <div class="debug-console" id="debug-log">
                    <div class="debug-line">READY...</div>
                </div>
            </div>
            <button class="btn" style="background: rgba(255,255,255,0.05); color: #fff;" onclick="copyAll()">📋 COPY ALL NUMBERS</button>
        </div>

        <div class="content">
            <div class="orders-container" id="orders-list">
                <div style="text-align: center; color: var(--text-dim); margin-top: 100px;">BELUM ADA NOMOR 🇲🇽</div>
            </div>
        </div>
    </div>
</div>

<div class="notif" id="notif">Copied!</div>

<script>
    let isRunning = false;
    let apiKey = localStorage.getItem('webbrutalhero_key') || '';
    let orders = [];
    let stats = { att: 0, found: 0, startTime: 0 };

    if (apiKey) document.getElementById('api-key').value = apiKey;

    function addDebug(msg, type='') {
        const log = document.getElementById('debug-log');
        const line = document.createElement('div');
        line.className = 'debug-line ' + (type === 'ok' ? 'debug-ok' : type === 'err' ? 'debug-err' : '');
        line.innerText = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
        log.prepend(line);
        if (log.children.length > 50) log.lastChild.remove();
    }

    function saveKey() {
        apiKey = document.getElementById('api-key').value.trim();
        localStorage.setItem('webbrutalhero_key', apiKey);
    }

    async function reqApi(action, extra = {}) {
        if (!apiKey) return;
        const params = new URLSearchParams({ action, api_key: apiKey, ...extra });
        try {
            const r = await fetch(`/api/proxy?${params.toString()}`);
            return await r.text();
        } catch (e) { return 'ERR_HTTP'; }
    }

    async function updateBalance() {
        saveKey();
        const res = await reqApi('getBalance');
        if (res && res.includes('ACCESS_BALANCE')) {
            const b = res.split(':')[1];
            document.getElementById('balance-val').innerText = parseFloat(b).toFixed(2);
            showNotif('BALANCE SYNCED');
            addDebug('Balance: $' + b, 'ok');
        }
    }

    function showNotif(txt) {
        const n = document.getElementById('notif');
        n.innerText = txt; n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 2000);
    }

    function toggleAutoBuy() {
        if (!apiKey) { alert('Enter API Key!'); return; }
        isRunning = !isRunning;
        const btn = document.getElementById('start-btn');
        const statsUi = document.getElementById('stats-ui');

        if (isRunning) {
            btn.innerText = '🛑 STOP SNIPING';
            btn.className = 'btn btn-stop';
            statsUi.style.display = 'block';
            resetStats();
            startBrutalLoop();
            addDebug('STARTING BRUTAL WAR...', 'ok');
        } else {
            btn.innerText = '🚀 START WAR';
            btn.className = 'btn btn-primary';
            addDebug('STOPPED.');
        }
    }

    function resetStats() {
        stats = { att: 0, found: 0, startTime: Date.now() };
        updateStatsUi();
    }

    function updateStatsUi() {
        const el = (Date.now() - stats.startTime) / 1000;
        document.getElementById('stat-att').innerText = stats.att;
        document.getElementById('stat-found').innerText = stats.found;
        document.getElementById('stat-speed').innerText = (stats.att / Math.max(el, 1)).toFixed(1);
    }

    async function startBrutalLoop() {
        const countrySelect = document.getElementById('country-select');
        const countryId = countrySelect.options[countrySelect.selectedIndex].getAttribute('data-id');
        const srv = document.getElementById('service-code').value.trim();
        const mP = document.getElementById('max-price').value.trim();

        while (isRunning) {
            stats.att++;
            if (stats.att % 10 === 0) updateStatsUi();

            let p = { service: srv, country: countryId };
            if (mP) p.maxPrice = mP;

            const res = await reqApi('getNumber', p);

            if (res && res.includes('ACCESS_NUMBER')) {
                const [_, id, num] = res.split(':');
                stats.found++;
                addOrder(id, num, mP || "Auto");
                updateStatsUi();
                updateBalance();
                addDebug('SUCCESS: ' + num, 'ok');
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
            } else if (res && res.includes('NO_BALANCE')) {
                isRunning = false; toggleAutoBuy(); alert('SALDO HABIS!'); break;
            } else if (res && !res.includes('NO_NUMBERS')) {
                addDebug('API REJECTED: ' + res, 'err');
                await new Promise(r => setTimeout(r, 500)); // Delay if error
            }

            await new Promise(r => setTimeout(r, 5));
        }
    }

    function addOrder(id, num, price) {
        const order = { id, number: num, price, status: 'waiting', otp: '', time: Date.now() };
        orders.unshift(order);
        renderOrders();
    }

    function renderOrders() {
        const list = document.getElementById('orders-list');
        if (orders.length === 0) return;
        list.innerHTML = orders.map(o => `
            <div class="order-item" id="card-${o.id}">
                <div class="order-info">
                    <div class="order-num" onclick="copyText('${o.number}')">+${o.number}</div>
                    <div class="order-meta">
                        ID: ${o.id} | $${o.price} | <span class="timer-val" id="timer-${o.id}">20:00</span>
                    </div>
                </div>
                <div class="order-status">
                    ${o.otp ? `<div class="otp-badge" onclick="copyText('${o.otp}')">${o.otp}</div>` : 
                      o.status === 'waiting' ? `<div class="loading-ring"></div>` : 
                      `<span style="color:var(--text-dim);font-weight:900">${o.status.toUpperCase()}</span>`}
                    ${o.status === 'waiting' ? `<button class="btn-cancel" id="btn-can-${o.id}" onclick="cancelOrder('${o.id}')" disabled>WAITING (120s)</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    // INDEPENDENT TICK FOR UI (FIXED TIMER & CANCEL)
    setInterval(async () => {
        const now = Date.now();
        const waiting = orders.filter(o => o.status === 'waiting');
        
        for (const o of waiting) {
            const elapsed = Math.floor((now - o.time) / 1000);
            const remain = 1200 - elapsed;
            
            // UI Update Timer
            const timerEl = document.getElementById(`timer-${o.id}`);
            if (timerEl) {
                if (remain <= 0) timerEl.innerText = "EXPIRED";
                else timerEl.innerText = `${Math.floor(remain/60)}:${(remain%60).toString().padStart(2,'0')}`;
            }

            // UI Update Cancel Button
            const cancelBtn = document.getElementById(`btn-can-${o.id}`);
            if (cancelBtn) {
                if (elapsed >= 120) {
                    cancelBtn.disabled = false;
                    cancelBtn.innerText = "✕ CANCEL";
                    cancelBtn.style.background = "rgba(255, 77, 77, 0.2)";
                } else {
                    cancelBtn.innerText = `WAIT (${120 - elapsed}s)`;
                }
            }

            // Check OTP
            const res = await reqApi('getStatus', { id: o.id });
            if (res && res.includes('STATUS_OK')) {
                const otp = res.split(':')[1];
                o.status = 'done';
                o.otp = otp;
                renderOrders();
                addDebug('OTP RECEIVED!', 'ok');
                new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3').play().catch(()=>{});
                reqApi('setStatus', { id: o.id, status: 6 });
            }
            if (remain <= 0) { o.status = 'expired'; renderOrders(); }
        }
    }, 1000);

    async function cancelOrder(id) {
        const res = await reqApi('setStatus', { id, status: 8 });
        if (res && res.includes('ACCESS_CANCEL')) {
            const o = orders.find(x => x.id === id);
            if (o) o.status = 'cancelled';
            renderOrders();
            addDebug('Cancelled ID: ' + id, 'ok');
        } else {
            addDebug('API Rejected Cancel: ' + res, 'err');
        }
    }

    function copyText(txt) { navigator.clipboard.writeText(txt); showNotif('COPIED!'); }
    function copyAll() {
        const t = orders.filter(o => o.status === 'waiting').map(o => o.number).join('\n');
        if (t) { navigator.clipboard.writeText(t); showNotif('ALL COPIED!'); }
    }
    setInterval(updateBalance, 60000);
</script>
</body>
</html>
