<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBrutalHero — HERO-SMS ULTRA BRUTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060608;
            --panel: #0e0e12;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --gold: #ffcc00;
            --text: #f0f0f0;
            --text-dim: #888888;
            --success: #00ffaa;
            --danger: #ff4d4d;
            --border: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            background-image: radial-gradient(circle at 0% 0%, #001a1a 0%, transparent 40%);
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 30px;
        }

        .logo { font-size: 26px; font-weight: 800; text-transform: uppercase; color: #fff; }
        .logo span { color: var(--accent); }

        .balance-card {
            background: rgba(0, 242, 255, 0.05);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }
        .balance-card span { color: var(--success); font-weight: 800; font-family: 'JetBrains Mono', monospace; font-size: 18px; }
        .refresh-btn { font-size: 20px; transition: 0.3s; }
        .refresh-btn:hover { transform: rotate(180deg); }

        .api-section {
            background: var(--panel);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            display: flex;
            gap: 12px;
        }
        input {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .btn {
            padding: 14px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-stop { background: var(--danger); color: #fff; }

        .main-grid { display: grid; grid-template-columns: 320px 1fr; gap: 25px; }

        .card {
            background: var(--panel);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            margin-bottom: 15px;
            outline: none;
        }

        .stats-box {
            padding: 15px;
            background: #000;
            border-radius: 12px;
            font-size: 14px;
        }
        .stats-box p { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .stats-box span { color: var(--accent); font-weight: 800; }

        /* LIST NUMBER VERTICAL - GAK MENYAMPING */
        .orders-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 80vh;
            overflow-y: auto;
            width: 100%;
        }

        .order-item {
            background: var(--panel);
            width: 100%; /* Full width box */
            padding: 18px 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--accent);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .order-info { display: flex; flex-direction: column; gap: 4px; }
        .order-num { font-size: 22px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #fff; cursor: pointer; letter-spacing: 1px; }
        .order-meta { font-size: 12px; color: var(--text-dim); }
        .timer-val { color: var(--gold); font-size: 13px; font-weight: 600; }

        .order-status { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

        .otp-badge {
            background: var(--success);
            color: #000;
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            box-shadow: 0 0 15px var(--success);
            cursor: pointer;
        }

        .btn-cancel {
            background: rgba(255, 77, 77, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 6px 14px;
            font-size: 11px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-cancel:disabled { opacity: 0.3; cursor: not-allowed; }

        .notif {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 12px;
            background: var(--accent);
            color: #000;
            font-weight: 800;
            transform: translateY(150px);
            transition: 0.4s;
            z-index: 1000;
        }
        .notif.show { transform: translateY(0); }

        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">WEBBRUTAL <span>HERO</span></div>
        <div class="balance-card" id="balance-area">
            <span id="balance-val">0.00</span> <small style="color:var(--text-dim)">USD</small>
            <div class="refresh-btn" onclick="updateBalance()">🔄</div>
        </div>
    </header>

    <div class="api-section">
        <input type="password" id="api-key" placeholder="Enter Hero-SMS API Key..." onchange="saveKey()">
        <button class="btn btn-primary" onclick="updateBalance()">SAVE & CHECK</button>
    </div>

    <div class="main-grid">
        <div class="sidebar">
            <div class="card">
                <h3 style="margin-bottom: 12px; font-size: 14px; color: var(--accent);">TARGET CONFIG</h3>
                <select id="country-select">
                    <option value="vietnam" data-id="10" data-code="84" data-max="0.2">Vietnam 🇻🇳</option>
                    <option value="colombia" data-id="33" data-code="57" data-max="0.2">Colombia 🇨🇴</option>
                    <option value="philipina" data-id="3" data-code="63" data-max="0.2">Philipina 🇵🇭</option>
                    <option value="mexico" data-id="54" data-code="52" data-max="1.6" selected>Mexico 🇲🇽 (HOT)</option>
                    <option value="brazil" data-id="73" data-code="55" data-max="1.5">Brazil 🇧🇷</option>
                </select>
                <label style="font-size: 11px; color: var(--text-dim); margin-bottom: 5px; display: block;">MAX PRICE ($):</label>
                <input type="number" id="max-price" value="1.6" step="0.01" style="width: 100%; margin-bottom: 15px;">
                <button id="start-btn" class="btn btn-primary" style="width: 100%; height: 55px;" onclick="toggleAutoBuy()">🚀 START BRUTAL WAR</button>
                <div class="stats-box" id="stats-ui" style="display: none; margin-top: 15px;">
                    <p>ATTEMPTS: <span id="stat-att">0</span></p>
                    <p>FOUND: <span id="stat-found">0</span></p>
                    <p>SPEED: <span id="stat-speed">0.0</span>/s</p>
                </div>
            </div>
            <button class="btn" style="background: rgba(255,255,255,0.05); color: #fff; width: 100%;" onclick="copyAll()">📋 COPY ALL NUMBERS</button>
        </div>

        <div class="content">
            <div class="orders-container" id="orders-list">
                <div style="text-align: center; color: var(--text-dim); margin-top: 80px;">READY FOR SNIPING 🇲🇽</div>
            </div>
        </div>
    </div>
</div>

<div class="notif" id="notif">Copied!</div>

<script>
    let isRunning = false;
    let apiKey = localStorage.getItem('webbrutalhero_key') || '';
    let orders = [];
    let stats = { att: 0, found: 0, startTime: 0 };

    if (apiKey) document.getElementById('api-key').value = apiKey;

    function saveKey() {
        apiKey = document.getElementById('api-key').value.trim();
        localStorage.setItem('webbrutalhero_key', apiKey);
    }

    async function reqApi(action, extra = {}) {
        if (!apiKey) return;
        const params = new URLSearchParams({ action, api_key: apiKey, ...extra });
        try {
            const r = await fetch(`/api/proxy?${params.toString()}`);
            return await r.text();
        } catch (e) { return 'ERR_HTTP'; }
    }

    async function updateBalance() {
        saveKey();
        const res = await reqApi('getBalance');
        if (res && res.includes('ACCESS_BALANCE')) {
            const b = res.split(':')[1];
            document.getElementById('balance-val').innerText = parseFloat(b).toFixed(2);
            showNotif('Balance Refreshed: $' + b);
        }
    }

    function showNotif(txt) {
        const n = document.getElementById('notif');
        n.innerText = txt;
        n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 2000);
    }

    function toggleAutoBuy() {
        if (!apiKey) { alert('Enter API Key!'); return; }
        isRunning = !isRunning;
        const btn = document.getElementById('start-btn');
        const statsUi = document.getElementById('stats-ui');

        if (isRunning) {
            btn.innerText = '🛑 STOP BRUTAL WAR';
            btn.className = 'btn btn-stop';
            statsUi.style.display = 'block';
            resetStats();
            startBrutalLoop();
        } else {
            btn.innerText = '🚀 START BRUTAL WAR';
            btn.className = 'btn btn-primary';
        }
    }

    function resetStats() {
        stats = { att: 0, found: 0, startTime: Date.now() };
        updateStatsUi();
    }

    function updateStatsUi() {
        const el = (Date.now() - stats.startTime) / 1000;
        document.getElementById('stat-att').innerText = stats.att;
        document.getElementById('stat-found').innerText = stats.found;
        document.getElementById('stat-speed').innerText = (stats.att / Math.max(el, 1)).toFixed(1);
    }

    function startBrutalLoop() {
        const countrySelect = document.getElementById('country-select');
        const countryId = countrySelect.options[countrySelect.selectedIndex].getAttribute('data-id');
        const maxPrice = document.getElementById('max-price').value;

        const loop = setInterval(async () => {
            if (!isRunning) { clearInterval(loop); return; }
            stats.att++;
            if (stats.att % 20 === 0) updateStatsUi();

            const res = await reqApi('getNumber', { service: 'wa', country: countryId, maxPrice: maxPrice });
            if (res && res.includes('ACCESS_NUMBER')) {
                const [_, id, num] = res.split(':');
                stats.found++;
                addOrder(id, num, maxPrice);
                updateStatsUi();
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{});
            }
        }, 5); 
    }

    function addOrder(id, num, price) {
        const order = { id, number: num, price, status: 'waiting', otp: '', time: Date.now() };
        orders.unshift(order);
        renderOrders();
    }

    function renderOrders() {
        const list = document.getElementById('orders-list');
        if (orders.length === 0) return;
        list.innerHTML = orders.map(o => `
            <div class="order-item">
                <div class="order-info">
                    <div class="order-num" onclick="copyText('${o.number}')">+${o.number}</div>
                    <div class="order-meta">ID: ${o.id} | $${o.price} | <span class="timer-val" id="timer-${o.id}">20:00</span></div>
                </div>
                <div class="order-status">
                    ${o.otp ? `<div class="otp-badge" onclick="copyText('${o.otp}')">${o.otp}</div>` : 
                      o.status === 'waiting' ? `<div class="loading-ring"></div>` : 
                      `<span style="color:var(--text-dim);font-weight:800">${o.status.toUpperCase()}</span>`}
                    ${o.status === 'waiting' ? `<button class="btn-cancel" id="btn-can-${o.id}" onclick="cancelOrder('${o.id}')" disabled>WAITING (2m)</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    // TIMER & OTP WATCHER (Fix: Timer & Cancel Button)
    setInterval(async () => {
        const now = Date.now();
        const waiting = orders.filter(o => o.status === 'waiting');
        
        for (const o of waiting) {
            // Update Timer
            const el = Math.floor((now - o.time) / 1000);
            const rem = 1200 - el;
            const tEl = document.getElementById(`timer-${o.id}`);
            if (tEl) {
                if (rem <= 0) tEl.innerText = "EXPIRED";
                else tEl.innerText = `${Math.floor(rem/60)}:${(rem%60).toString().padStart(2,'0')}`;
            }

            // Enable Cancel button after 2 mins (120s)
            const cBtn = document.getElementById(`btn-can-${o.id}`);
            if (cBtn && el >= 120) {
                cBtn.disabled = false;
                cBtn.innerText = "✕ CANCEL";
                cBtn.style.background = "rgba(255, 77, 77, 0.2)";
            } else if (cBtn) {
                cBtn.innerText = `WAIT (${120 - el}s)`;
            }

            // Check OTP
            const res = await reqApi('getStatus', { id: o.id });
            if (res && res.includes('STATUS_OK')) {
                const otp = res.split(':')[1];
                o.status = 'done';
                o.otp = otp;
                renderOrders();
                new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3').play().catch(()=>{});
                reqApi('setStatus', { id: o.id, status: 6 });
            }
            if (rem <= 0) { o.status = 'expired'; renderOrders(); }
        }
    }, 1000);

    async function cancelOrder(id) {
        const res = await reqApi('setStatus', { id, status: 8 });
        if (res && res.includes('ACCESS_CANCEL')) {
            const o = orders.find(x => x.id === id);
            if (o) o.status = 'cancelled';
            renderOrders();
            showNotif('ORDER CANCELLED');
        } else {
            showNotif('CANCEL FAILED');
        }
    }

    function copyText(txt) { navigator.clipboard.writeText(txt); showNotif('COPIED!'); }
    function copyAll() {
        const t = orders.filter(o => o.status === 'waiting').map(o => o.number).join('\n');
        if (t) { navigator.clipboard.writeText(t); showNotif('ALL COPIED!'); }
    }
    setInterval(updateBalance, 60000);
</script>
</body>
</html>
